<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 - Centurion 专用版V1.2</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f6f6f6;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      width: 320px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px 0;
      text-align: center;
    }
    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 13px;
    }
    input {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>控制面板登录</h1>
    <form method="post" action="/login">
      <label for="username">账号</label>
      <input id="username" name="username" placeholder="请输入账号" required>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" placeholder="请输入密码" required>
      <button type="submit">登录</button>
    </form>
  </div>
</body>
</html>
